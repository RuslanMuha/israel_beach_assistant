spring:
  datasource:
    url: jdbc:h2:mem:beach_assistant_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  task:
    scheduling:
      enabled: false

beach:
  telegram:
    mode: polling
    token: TEST_TOKEN
    username: test_bot
    outbox:
      enabled: false
    rate-limit:
      enabled: false
  providers:
    stub: true
  freshness:
    default-fresh-hours: 24
    default-stale-hours: 72
  scheduler:
    sea-forecast-rate-ms: 999999999
    advisory-rate-ms: 999999999
    jellyfish-rate-ms: 999999999
    camera-health-rate-ms: 999999999
